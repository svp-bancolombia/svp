<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Celular</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(#2d7be5, #f5f7fa 40%);
    }

    .header {
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 18px;
    }

    .container {
        display: flex;
        justify-content: center;
        margin-top: 30px;
    }

    .card {
        background: white;
        width: 90%;
        max-width: 360px;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        text-align: center;
    }

    .logo {
        font-size: 22px;
        margin-bottom: 10px;
    }

    .title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .subtitle {
        color: #555;
        margin-bottom: 20px;
        font-size: 16px;
    }

    .input-group {
        display: flex;
        align-items: center;
        border: 1px solid #ccc;
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 15px;
    }

    .prefix {
        margin-right: 10px;
        color: #333;
    }

    .input {
        border: none;
        outline: none;
        flex: 1;
        font-size: 16px;
    }

    .switch {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 15px 0;
        font-size: 14px;
    }

    .toggle {
        width: 40px;
        height: 20px;
        background: #ccc;
        border-radius: 20px;
        position: relative;
        cursor: pointer;
    }

    .toggle::after {
        content: "";
        width: 18px;
        height: 18px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 1px;
        left: 1px;
        transition: 0.3s;
    }

    .toggle.active {
        background: #2d7be5;
    }

    .toggle.active::after {
        left: 21px;
    }

    .link {
        color: #2d7be5;
        text-decoration: none;
        font-weight: bold;
    }

    .version {
        margin-top: 20px;
        font-size: 12px;
        color: #888;
    }

    .btn {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 360px;
        padding: 15px;
        border-radius: 30px;
        border: none;
        background: #2d7be5;
        color: white;
        font-size: 18px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="header">Iniciar sesión</div>

<div class="container">
    <div class="card">
        <div class="logo">🔵🟠</div>
        <div class="title">¡Hola! 👋</div>
        <div class="subtitle">¿Cuál es tu número de celular registrado?</div>

        <div class="input-group">
            <span class="prefix">🇵🇦 +507</span>
            <input type="text" class="input" placeholder="6404-8466">
        </div>

        <div class="switch">
            <span>Recordar celular</span>
            <div class="toggle" onclick="this.classList.toggle('active')"></div>
        </div>

        <div style="margin-top:15px;">
            ¿Primera vez? <a href="#" class="link">Regístrate</a>
        </div>

        <div class="version">Versión 2.0.161727</div>
    </div>
</div>

<button class="btn">Siguiente</button>

</body>
</html>
